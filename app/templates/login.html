<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Plataforma IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2>Iniciar Sesión</h2>

    <form action="{{ url_for('usuario.login') }}" method="POST">
        <input type="email" name="correo" placeholder="Correo electrónico" required><br><br>
        
        <input type="password" name="contrasena" placeholder="Contraseña" required><br><br>
        
        <button type="submit">Entrar</button>
    </form>

    <br>
    <a href="{{ url_for('usuario.registro') }}">¿No tienes cuenta? Regístrate aquí</a>

</body>
</html>
