<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión - Blossom</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <header class="main-header">
    <div class="logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Blossom Logo">
    </div>
    <p class="motto">Inicia sesión o regístrate para comenzar tu viaje del aprendizaje</p>
  </header>

  <main class="login-container">
    
    <section class="welcome-section">
      <h1 class="welcome-title">Bienvenido!!</h1>
      
      <div class="math-symbol-collage"></div>
    </section>
    
    <section class="form-section">
      <h2 class="form-title">INICIAR SESIÓN</h2>
      
      <form action="{{ url_for('usuario.login') }}" method="POST" class="blossom-form">
        
        <input type="email" name="correo" class="form-input" placeholder="tu @email.com" required>
        
        <input type="password" name="contrasena" class="form-input" placeholder="contraseña" required>
        
        <button type="submit" class="submit-btn">INICIAR SESIÓN</button>
      
      </form>

      <div class="register-link-container">
        <p>¿No tienes cuenta aún? 
            <a href="{{ url_for('usuario.registro') }}" class="register-link">Regístrate aquí</a>
        </p>
        </div>
    </section>

  </main>

</body>
</html>
