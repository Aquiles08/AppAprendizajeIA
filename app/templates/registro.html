<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta - Blossom</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Blossom Logo">
        </div>
        <p class="motto">Inicia sesión o regístrate para comenzar tu viaje del aprendizaje</p>
    </header>

    <main class="signup-container">
        <h2 class="form-title">CREAR CUENTA</h2>

        <form action="{{ url_for('usuario.crear_cuenta') }}" method="POST" class="blossom-signup-form">
            
            <div class="signup-content">
                <div class="inputs-column">
                    <input type="text" name="nombre" class="form-input" placeholder="nombre completo" required>
                    <input type="password" name="contrasena" class="form-input" placeholder="contraseña" required>
                    <input type="email" name="correo" class="form-input" placeholder="tu @email.com" required>
                </div>

                <div class="role-selection-column">
                    <p class="role-label">Rol</p>
                    <div class="roles-container">
                        
                        <label class="role-card">
                            <input type="radio" name="tipo_usuario" value="Estudiante" checked>
                            <div class="role-design">
                                <img src="{{ url_for('static', filename='img/alumno.png') }}" alt="Estudiante">
                                <span>Estudiante</span>
                            </div>
                        </label>

                        <label class="role-card">
                            <input type="radio" name="tipo_usuario" value="Docente">
                            <div class="role-design">
                                <img src="{{ url_for('static', filename='img/profesor.png') }}" alt="Profesor">
                                <span>Profesor</span>
                            </div>
                        </label>

                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn-wide">REGISTRARSE</button>
        </form>
    </main>

</body>
</html>
