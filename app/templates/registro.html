<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Plataforma IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2>Crear Cuenta</h2>

    <form action="{{ url_for('usuario.crear_cuenta') }}" method="POST">
        <input type="text" name="nombre" placeholder="Nombre completo" required><br><br>

        <input type="email" name="correo" placeholder="Correo electrónico" required><br><br>

        <input type="password" name="contrasena" placeholder="Contraseña" required><br><br>

        <select name="tipo_usuario">
            <option value="Estudiante">Estudiante</option>
            <option value="Docente">Docente</option>
        </select>

        <button type="submit">Registrarse</button>
    </form>

    <br>
    <a href="{{ url_for('usuario.login') }}">¿Ya tienes cuenta? Inicia sesión</a>

</body>
</html>
