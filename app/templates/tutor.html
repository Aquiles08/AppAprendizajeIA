<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tutor IA - Blossom</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Blossom Logo">
        </div>
        <div class="user-avatar-header">
            <div class="avatar-circle-sm">
                <span>{{ session['usuario_nombre'][0] | upper }}</span>
            </div>
            <span class="user-name-header">{{ session['usuario_nombre'] }}</span>
        </div>
    </header>

    <main class="tutor-container">
        <div class="tutor-header-row">
            <div class="tutor-titles">
                <h1 class="welcome-title">Tutor virtual de IA</h1>
                <p>Pregunta lo que quieras. La IA está aquí para resolver tus dudas 24/7</p>
            </div>
            <a href="{{ url_for('usuario.dashboard') }}" class="btn-inicio-small">Inicio</a>
        </div>

        <section class="tutor-interaction-container">
            <div class="chat-main-column">
                <div class="chat-bubble-area" id="chatWindow">
                    <!-- Mensaje inicial del tutor -->
                    <div class="chat-message-ai">
                        <img src="{{ url_for('static', filename='img/avatar_robot.png') }}" class="chat-avatar">
                        <div class="message-text">Hola soy tu tutor de IA, ¿En qué puedo ayudarte hoy?</div>
                    </div>
                    
                    <!-- EJEMPLO DE CONVERSACIÓN: Mensaje del usuario "Cuanto es 2 + 2??" -->
                    <div class="chat-message-user">
                        <div class="message-text">Cuanto es 2 + 2??</div>
                        <!-- Opcional: avatar del usuario, si quieres lo agregamos -->
                    </div>
                </div>

                <form class="chat-input-row" id="chatForm">
                    <input type="text" id="userInput" placeholder="Escribe para hablar con tu Tutor IA" class="input-escribir">
                    <button type="submit" class="btn-enviar-chat">
                        <img src="{{ url_for('static', filename='img/arrow_send.png') }}" alt="Enviar">
                    </button>
                </form>
            </div>

            <div class="robot-side-column">
                <div class="robot-frame">
                    <img src="{{ url_for('static', filename='img/estadoNormal1.png') }}" id="robotAnimated" class="robot-img">
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/animacionRobot.js') }}"></script>

</body>
</html>
