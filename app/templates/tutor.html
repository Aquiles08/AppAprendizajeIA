<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tutor IA - Plataforma IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='static/style.css') }}">
</head>
<body>
    <h2>Tutor IA</h2>

    <div id="chat-container" style="border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: white;">
        {% if historial %}
            {% for mensaje in historial %}
                <p><strong>{{ mensaje.rol }}:</strong> {{ mensaje.texto }}</p>
            {% endfor %}
        {% else %}
            <p><em>Hola, soy tu tutor de IA. ¿En qué puedo ayudarte hoy?</em></p>
        {% endif %}
    </div>

    <form action="{{ url_for('usuario.preguntar_tutor') }}" method="POST">
        <input type="text" name="pregunta" placeholder="Escribe tu duda sobre matemáticas..." required style="width: 80%;">
        <button type="submit">Enviar</button>
    </form>

    <br>
    <a href="{{ url_for('usuario.dashboard') }}">Volver al Dashboard</a>
</body>
</html>
