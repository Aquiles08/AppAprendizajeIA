<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Práctica - Blossom</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Blossom Logo">
        </div>
        <div class="user-avatar-header">
            <div class="avatar-circle-sm">
                <span>{{ session['usuario_nombre'][0] | upper if session['usuario_nombre'] else 'G' }}</span>
            </div>
            <span class="user-name-header">{{ session['usuario_nombre'] if session['usuario_nombre'] else 'Gael' }}</span>
        </div>
    </header>

    <main class="practica-container">
        <div class="practica-header-row">
            <div class="practica-titles">
                <h1 class="welcome-title">Práctica</h1>
                <p>Ejercicios interactivos con retroalimentación paso a paso adaptados a tu nivel</p>
            </div>
            <a href="{{ url_for('usuario.dashboard') }}" class="btn-inicio-small">Inicio</a>
        </div>

        <section class="practica-content-card">
            <div class="temas-selector-container">
                <label for="temas-select" class="temas-label">Temas</label>
                <div class="custom-select-wrapper">
                    <select name="tema" id="temas-select">
                        <option value="#" selected>Operaciones Básicas</option>
                        <option value="ecuaciones">Ecuaciones Lineales</option>
                        <option value="sistemas">Sistemas de Ecuaciones</option>
                    </select>
                    <div class="select-arrow"></div>
                </div>
            </div>

            <div id="contenedor-ejercicios" class="ejercicios-grid">
                <div class="ejercicio-card">
                    <p class="ejercicio-enunciado">Cargando ejercicios de IA...</p>
                </div>
            </div>

            <div class="submit-practica-container">
                <button type="button" class="submit-btn-wide" id="btn-finalizar" onclick="finalizarSesion()">
                    Enviar respuestas
                </button>
            </div>
        </section>
    </main>

    <script>
        // Usamos el parse que te funcionó para evitar errores de sintaxis en el editor
        const listaEjercicios = JSON.parse('{{ ejercicios | tojson | safe }}');
    </script>
    
    <script src="{{ url_for('static', filename='js/practica.js') }}"></script>

</body>
</html>
